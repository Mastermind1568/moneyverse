<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moneyverse — Outcome Ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<!--
X (Twitter) Copy:
Headline (17 chars): "Build a position."
Description (75 chars): "Most people know Bitcoin. Few have a real position. The Blueprint fixes that."
URL: moneyverse.network
Word count on image: 6 (headline) + 7 (benefit) + 3 (CTA) = 16 words
-->

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
  }
  .logo svg {
    height: 5vh;
    width: auto;
  }
  .middle {
    display: flex;
    flex-direction: column;
    gap: 3vh;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 11vw;
    line-height: 1.05;
    color: #000000;
    margin: 0;
  }
  .headline em {
    font-style: italic;
    color: #F7931A;
  }
  .benefit {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 2.6vw;
    color: rgba(0,0,0,0.5);
    line-height: 1.4;
    margin: 0;
  }
  .cta {
    display: inline-block;
    padding: 1.8vh 4.5vw;
    background: #000000;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.6vw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    align-self: flex-start;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="logo">
    <svg viewBox="0 0 320 44" xmlns="http://www.w3.org/2000/svg" aria-label="Moneyverse">
      <text y="36" font-family="'Playfair Display', serif" font-weight="900" font-size="34" letter-spacing="5" fill="#000000">MONEYVERSE</text>
    </svg>
  </div>
  <div class="middle">
    <div class="headline">Build a position.<br><em>Not a prayer.</em></div>
    <div class="benefit">16 modules. Zero to sovereign<br>Bitcoin holder.</div>
    <a class="cta" href="#">Access The Blueprint</a>
  </div>
</div>
</body>
</html>
