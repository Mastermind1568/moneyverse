<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moneyverse — Outcome Ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<!--
X (Twitter) Copy:
Headline (17 chars): "Build a position."
Description (79 chars): "Most people know Bitcoin. Few have a real position. The Blueprint changes that."
URL: moneyverse.network
-->

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 1.2vw;
  }
  .logo-wordmark {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 3.2vw;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #000000;
    line-height: 1;
  }
  .logo-badge {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.2vw;
    color: #999999;
    border: 1px solid #CCCCCC;
    padding: 0.2vh 0.5vw;
    letter-spacing: 0.05em;
  }
  .middle {
    display: flex;
    flex-direction: column;
    gap: 3vh;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 9.5vw;
    line-height: 1.05;
    color: #000000;
    margin: 0;
  }
  .headline em {
    font-style: italic;
    color: #F7931A;
  }
  .benefit {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 2.4vw;
    color: rgba(0,0,0,0.55);
    line-height: 1.4;
    margin: 0;
  }
  .cta {
    display: inline-block;
    padding: 1.8vh 4.5vw;
    background: #000000;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.6vw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    align-self: flex-start;
    border-radius: 0;
    text-decoration: none;
  }
  .footer {
    font-family: 'Inter', sans-serif;
    font-size: 1.6vw;
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.08em;
    text-transform: lowercase;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="logo">
    <span class="logo-wordmark">Moneyverse</span>
    <span class="logo-badge">V1.0</span>
  </div>
  <div class="middle">
    <div class="headline">Build a position.<br><em>Not a prayer.</em></div>
    <div class="benefit">16 modules. One complete protocol.<br>From zero to sovereign Bitcoin holder.</div>
    <a class="cta" href="#">Access The Blueprint</a>
  </div>
  <span class="footer">moneyverse.network</span>
</div>
</body>
</html>
