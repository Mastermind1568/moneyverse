<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moneyverse — Curiosity Ad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<!--
X (Twitter) Copy:
Headline (23 chars): "The cycle doesn't care."
Description (69 chars): "The 4-year cycle runs on math. Position around it or get left behind."
URL: moneyverse.network
-->

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .ad {
    width: 100vw;
    height: 100vh;
    background: #111111;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6vh 7vw;
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 1.2vw;
  }
  .logo-wordmark {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 3.2vw;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #FFFFFF;
    line-height: 1;
  }
  .logo-badge {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.2vw;
    color: #555555;
    border: 1px solid #333333;
    padding: 0.2vh 0.5vw;
    letter-spacing: 0.05em;
  }
  .middle {
    display: flex;
    flex-direction: column;
    gap: 3vh;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 8.8vw;
    line-height: 1.05;
    color: #FFFFFF;
    margin: 0;
  }
  .headline .accent {
    color: #F7931A;
  }
  .benefit {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 2.4vw;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
    margin: 0;
  }
  .cta {
    display: inline-block;
    padding: 1.8vh 4.5vw;
    background: #F7931A;
    color: #000000;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.6vw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    align-self: flex-start;
    border-radius: 0;
    text-decoration: none;
  }
  .footer {
    font-family: 'Inter', sans-serif;
    font-size: 1.6vw;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
    text-transform: lowercase;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="logo">
    <span class="logo-wordmark">Moneyverse</span>
    <span class="logo-badge">V1.0</span>
  </div>
  <div class="middle">
    <div class="headline">The <span class="accent">4-year cycle</span><br>doesn't care<br>about your feelings.</div>
    <div class="benefit">Math. Not emotions. Learn to position<br>around the cycle before it passes you.</div>
    <a class="cta" href="#">Learn The Cycle</a>
  </div>
  <span class="footer">moneyverse.network</span>
</div>
</body>
</html>
